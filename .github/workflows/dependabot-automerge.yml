name: Dependabot Auto Merge

on:
  workflow_run:
    workflows: ["CI"]
    types: ["completed"]

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  merge:
    name: Merge green Dependabot PRs
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Find and merge matching Dependabot PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          pr_number="$(gh pr list \
            --repo "$REPO" \
            --state open \
            --json number,author,headRefOid \
            --jq ".[] | select(.headRefOid == \"$HEAD_SHA\") | select(.author.login == \"app/dependabot\" or .author.login == \"dependabot[bot]\") | .number" \
            | head -n 1)"

          if [ -z "$pr_number" ]; then
            echo "No matching open Dependabot PR for ${HEAD_SHA}."
            exit 0
          fi

          echo "Found Dependabot PR #${pr_number}."

          # 仅自动合并「分组的 minor/patch 更新」；major 及其它更新保留人工审批。
          head_ref="$(gh pr view "$pr_number" --repo "$REPO" --json headRefName --jq .headRefName)"
          echo "PR 分支: ${head_ref}"
          case "$head_ref" in
            *app-deps*|*ci-actions*)
              echo "属于 minor/patch 分组，符合自动合并条件。"
              ;;
            *)
              echo "非 minor/patch 分组（疑似 major 或其它），跳过自动合并，保留人工审批。"
              gh pr comment "$pr_number" --repo "$REPO" --body "检测到非 minor/patch 更新（疑似 major），已跳过自动合并，请人工审查后再合并。" || true
              exit 0
              ;;
          esac

          checks="$(gh pr checks "$pr_number" --repo "$REPO" || true)"
          echo "$checks"

          if echo "$checks" | grep -E "Python checks[[:space:]]+fail|Gitleaks[[:space:]]+fail"; then
            echo "Required checks are failing; not merging."
            exit 1
          fi

          gh pr merge "$pr_number" --repo "$REPO" --squash --delete-branch
