version: 2

updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Hong_Kong"
    open-pull-requests-limit: 5
    # aiogram (<4) pins aiohttp<3.14; ignore 3.14.x until a compatible aiogram release ships.
    ignore:
      - dependency-name: "aiohttp"
        versions: [">=3.14"]
    groups:
      python-dependencies:
        patterns:
          - "*"
