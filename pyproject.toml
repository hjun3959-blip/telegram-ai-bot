[tool.ruff]
target-version = "py311"
line-length = 140
exclude = [
  ".git",
  ".venv",
  "venv",
  "env",
  "__pycache__",
  "logs",
  "docs/codegraph/codegraph.json",
]

[tool.ruff.lint]
select = [
  "E9",
  "F63",
  "F7",
  "F82",
]
ignore = []

[tool.bandit]
exclude_dirs = [
  ".git",
  ".venv",
  "venv",
  "env",
  "__pycache__",
  "logs",
  "scripts",
  "docs",
]
skips = [
  "B101",
]
